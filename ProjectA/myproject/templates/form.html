<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มข้อมูลประชากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header text-white">
                        <h2 class="text-center mb-0">เพิ่มข้อมูลประชากร</h2>
                    </div>
                    <div class="card-body">
                        <form method="post" action="/form/">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">
                                    <i class="fas fa-user"></i> ชื่อประชากร
                                </label>
                                <input type="text" class="form-control" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                            </div>
                            <div class="mb-3">
                                <label for="age" class="form-label fw-bold">
                                    <i class="fas fa-calendar"></i> อายุ
                                </label>
                                <input type="number" class="form-control" name="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" min="1" max="150" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success flex-fill">
                                    <i class="fas fa-save"></i> ลงทะเบียน
                                </button>
                                <a href="/" class="btn btn-secondary flex-fill">
                                    <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
</body>
</html>
